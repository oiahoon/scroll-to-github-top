<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="Arial, Helvetica, sans-serif">
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity=".18"/>
  </filter>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity=".14"/>
  </filter>
  <linearGradient id="darkBg" x1="0" y1="0" x2="1" y2="1">
    <stop stop-color="#0e1117"/>
    <stop offset="1" stop-color="#171d27"/>
  </linearGradient>
  <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
    <stop stop-color="#f8fafc"/>
    <stop offset="1" stop-color="#eef3f9"/>
  </linearGradient>
</defs>
<rect x="0" y="0" width="1280" height="800" rx="0" fill="#ffffff" stroke="none" stroke-width="1" />
<rect x="0" y="0" width="1280" height="800" rx="0" fill="#f4f7fb" stroke="none" stroke-width="1" /><rect x="82" y="58" width="1116" height="684" rx="16" fill="#ffffff" stroke="#dbe3ef" stroke-width="1" filter="url(#soft)"/><text x="126" y="118" font-size="32" fill="#162033" font-weight="760" >Smart TOC &amp; Scroll</text><text x="126" y="150" font-size="16" fill="#667085" font-weight="500" >Reading navigation settings</text><rect x="126" y="190" width="1004" height="1" rx="0" fill="#e4e9f2" stroke="none" stroke-width="1" /><rect x="126" y="230" width="1004" height="104" rx="10" fill="#f8fafc" stroke="#e1e7f0" stroke-width="1" /><text x="154" y="266" font-size="19" fill="#182033" font-weight="720" >Reading navigation style</text><text x="154" y="295" font-size="14" fill="#667085" font-weight="400" >Choose the outline that best matches the page.</text><rect x="772" y="260" width="160" height="34" rx="17" fill="#172033" stroke="#172033" stroke-width="1" /><text x="794" y="282" font-size="13" fill="#ffffff" font-weight="700" >Standard TOC Panel</text><rect x="948" y="260" width="154" height="34" rx="17" fill="#e9f4ff" stroke="#99caff" stroke-width="1" /><text x="970" y="282" font-size="13" fill="#125a9c" font-weight="700" >Reading Progress Outline</text><rect x="126" y="358" width="1004" height="104" rx="10" fill="#f8fafc" stroke="#e1e7f0" stroke-width="1" /><text x="154" y="394" font-size="19" fill="#182033" font-weight="720" >Display and placement</text><text x="154" y="423" font-size="14" fill="#667085" font-weight="400" >Keep controls close, but away from content.</text><rect x="772" y="388" width="160" height="34" rx="17" fill="#ffffff" stroke="#cfd8e6" stroke-width="1" /><text x="794" y="410" font-size="13" fill="#263244" font-weight="700" >Right side</text><rect x="948" y="388" width="154" height="34" rx="17" fill="#ffffff" stroke="#cfd8e6" stroke-width="1" /><text x="970" y="410" font-size="13" fill="#263244" font-weight="700" >Left side</text><rect x="126" y="486" width="1004" height="104" rx="10" fill="#f8fafc" stroke="#e1e7f0" stroke-width="1" /><text x="154" y="522" font-size="19" fill="#182033" font-weight="720" >Compatibility</text><text x="154" y="551" font-size="14" fill="#667085" font-weight="400" >Avoid duplicate page widgets automatically.</text><rect x="772" y="516" width="160" height="34" rx="17" fill="#ffffff" stroke="#cfd8e6" stroke-width="1" /><text x="794" y="538" font-size="13" fill="#263244" font-weight="700" >Auto avoid existing TOC</text><rect x="948" y="516" width="154" height="34" rx="17" fill="#ffffff" stroke="#cfd8e6" stroke-width="1" /><text x="970" y="538" font-size="13" fill="#263244" font-weight="700" >Force show when needed</text><rect x="126" y="614" width="1004" height="104" rx="10" fill="#f8fafc" stroke="#e1e7f0" stroke-width="1" /><text x="154" y="650" font-size="19" fill="#182033" font-weight="720" >Adaptive appearance</text><text x="154" y="679" font-size="14" fill="#667085" font-weight="400" >Adjust gently for light and dark page surfaces.</text><rect x="772" y="644" width="160" height="34" rx="17" fill="#ffffff" stroke="#cfd8e6" stroke-width="1" /><text x="794" y="666" font-size="13" fill="#263244" font-weight="700" >Auto contrast</text><rect x="948" y="644" width="154" height="34" rx="17" fill="#ffffff" stroke="#cfd8e6" stroke-width="1" /><text x="970" y="666" font-size="13" fill="#263244" font-weight="700" >Local progress styling</text><rect x="126" y="686" width="1004" height="1" rx="0" fill="#e4e9f2" stroke="none" stroke-width="1" /><text x="126" y="716" font-size="14" fill="#667085" font-weight="500" >Local-only page analysis. Preferences stay in your browser.</text>
</svg>