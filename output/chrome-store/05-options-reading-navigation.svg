<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="Arial, Helvetica, sans-serif">
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity=".18"/>
  </filter>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity=".14"/>
  </filter>
  <linearGradient id="darkBg" x1="0" y1="0" x2="1" y2="1">
    <stop stop-color="#0e1117"/>
    <stop offset="1" stop-color="#171d27"/>
  </linearGradient>
  <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
    <stop stop-color="#f8fafc"/>
    <stop offset="1" stop-color="#eef3f9"/>
  </linearGradient>
</defs>
<rect x="0" y="0" width="1280" height="800" rx="0" fill="#ffffff" stroke="none" stroke-width="1" />
<rect x="0" y="0" width="1280" height="800" rx="0" fill="#f4f7fb" stroke="none" stroke-width="1" /><rect x="82" y="58" width="1116" height="684" rx="16" fill="#ffffff" stroke="#dbe3ef" stroke-width="1" filter="url(#soft)"/><text x="126" y="118" font-size="32" fill="#162033" font-weight="760" >Smart TOC &amp; Scroll</text><text x="126" y="150" font-size="16" fill="#667085" font-weight="500" >Reading navigation settings</text><rect x="126" y="190" width="1004" height="1" rx="0" fill="#e4e9f2" stroke="none" stroke-width="1" /><rect x="126" y="230" width="1004" height="64" rx="10" fill="#f8fafc" stroke="#e1e7f0" stroke-width="1" /><text x="154" y="257" font-size="17" fill="#182033" font-weight="720" >阅读导航样式</text><text x="154" y="279" font-size="12" fill="#667085" font-weight="400" >选择适合当前页面的目录呈现方式。</text><rect x="772" y="245" width="154" height="34" rx="17" fill="#172033" stroke="#172033" stroke-width="1" /><text x="794" y="267" font-size="13" fill="#ffffff" font-weight="700" >标准目录面板</text><rect x="942" y="245" width="132" height="34" rx="17" fill="#e9f4ff" stroke="#99caff" stroke-width="1" /><text x="964" y="267" font-size="13" fill="#125a9c" font-weight="700" >阅读进度目录</text><rect x="126" y="306" width="1004" height="64" rx="10" fill="#f8fafc" stroke="#e1e7f0" stroke-width="1" /><text x="154" y="333" font-size="17" fill="#182033" font-weight="720" >交互方式</text><text x="154" y="355" font-size="12" fill="#667085" font-weight="400" >悬停预览、点击开关，或短按回顶 / 长按展开。</text><rect x="772" y="321" width="154" height="34" rx="17" fill="#172033" stroke="#172033" stroke-width="1" /><text x="794" y="343" font-size="13" fill="#ffffff" font-weight="700" >悬停预览</text><rect x="942" y="321" width="132" height="34" rx="17" fill="#ffffff" stroke="#cfd8e6" stroke-width="1" /><text x="964" y="343" font-size="13" fill="#263244" font-weight="700" >点击开关</text><rect x="126" y="382" width="1004" height="64" rx="10" fill="#f8fafc" stroke="#e1e7f0" stroke-width="1" /><text x="154" y="409" font-size="17" fill="#182033" font-weight="720" >显示条件</text><text x="154" y="431" font-size="12" fill="#667085" font-weight="400" >控制目录出现的时机，避免短页面被打扰。</text><rect x="772" y="397" width="154" height="34" rx="17" fill="#ffffff" stroke="#cfd8e6" stroke-width="1" /><text x="794" y="419" font-size="13" fill="#263244" font-weight="700" >滚动屏数 1</text><rect x="942" y="397" width="132" height="34" rx="17" fill="#ffffff" stroke="#cfd8e6" stroke-width="1" /><text x="964" y="419" font-size="13" fill="#263244" font-weight="700" >最少标题 3</text><rect x="126" y="458" width="1004" height="64" rx="10" fill="#f8fafc" stroke="#e1e7f0" stroke-width="1" /><text x="154" y="485" font-size="17" fill="#182033" font-weight="720" >位置</text><text x="154" y="507" font-size="12" fill="#667085" font-weight="400" >让浮层靠近阅读边缘，同时避开正文主要内容。</text><rect x="772" y="473" width="154" height="34" rx="17" fill="#172033" stroke="#172033" stroke-width="1" /><text x="794" y="495" font-size="13" fill="#ffffff" font-weight="700" >右侧</text><rect x="942" y="473" width="132" height="34" rx="17" fill="#ffffff" stroke="#cfd8e6" stroke-width="1" /><text x="964" y="495" font-size="13" fill="#263244" font-weight="700" >左侧</text><rect x="126" y="534" width="1004" height="64" rx="10" fill="#f8fafc" stroke="#e1e7f0" stroke-width="1" /><text x="154" y="561" font-size="17" fill="#182033" font-weight="720" >兼容策略</text><text x="154" y="583" font-size="12" fill="#667085" font-weight="400" >页面已有目录或回顶控件时，减少重复干扰。</text><rect x="718" y="549" width="180" height="34" rx="17" fill="#172033" stroke="#172033" stroke-width="1" /><text x="740" y="571" font-size="13" fill="#ffffff" font-weight="700" >自动避让已有控件</text><rect x="914" y="549" width="126" height="34" rx="17" fill="#ffffff" stroke="#cfd8e6" stroke-width="1" /><text x="936" y="571" font-size="13" fill="#263244" font-weight="700" >始终显示</text><rect x="126" y="610" width="1004" height="74" rx="10" fill="#f8fafc" stroke="#e1e7f0" stroke-width="1" /><text x="154" y="637" font-size="17" fill="#182033" font-weight="720" >禁用域名</text><text x="154" y="659" font-size="12" fill="#667085" font-weight="400" >用逗号分隔多个域名。</text><rect x="760" y="625" width="340" height="44" rx="14" fill="#ffffff" stroke="#e1e7f0" stroke-width="1" /><text x="780" y="653" font-size="13" fill="#667085" font-weight="500" >example.com, docs.example.org</text><rect x="126" y="700" width="1004" height="1" rx="0" fill="#e4e9f2" stroke="none" stroke-width="1" /><text x="126" y="728" font-size="14" fill="#667085" font-weight="500" >Local-only page analysis. Preferences stay in your browser.</text>
</svg>