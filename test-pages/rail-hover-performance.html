<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart TOC Rail Navigation Performance Sample</title>
  <link rel="stylesheet" href="../toc.css?sample=barcode-preview-v1">
  <link rel="stylesheet" href="../themes.css?sample=barcode-preview-v1">
  <style>
    :root {
      color-scheme: dark;
    }

    :root[data-surface="light"] {
      color-scheme: light;
    }

    body {
      margin: 0;
      background: #181a1f;
      color: #f5f7fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
    }

    .sample-toolbar {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10020;
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: calc(100vw - 32px);
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 10px;
      background: rgba(17, 24, 39, 0.84);
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.22);
      color: #f5f7fa;
      font-size: 12px;
      line-height: 1;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    :root[data-position="left"] .sample-toolbar {
      right: 16px;
      left: auto;
    }

    :root[data-surface="light"] .sample-toolbar {
      border-color: rgba(15, 23, 42, 0.12);
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 12px 34px rgba(15, 23, 42, 0.10);
      color: #151922;
    }

    .sample-toolbar-title {
      padding: 0 4px;
      color: currentColor;
      font-weight: 700;
      white-space: nowrap;
    }

    .sample-control-group {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    :root[data-surface="light"] .sample-control-group {
      background: rgba(15, 23, 42, 0.06);
    }

    .sample-toolbar button,
    .sample-motion-toggle {
      min-height: 28px;
      border: 0;
      border-radius: 999px;
      color: currentColor;
      font: inherit;
      white-space: nowrap;
    }

    .sample-toolbar button {
      padding: 0 10px;
      background: transparent;
      cursor: pointer;
    }

    .sample-toolbar button:hover {
      background: rgba(255, 255, 255, 0.10);
    }

    :root[data-surface="light"] .sample-toolbar button:hover {
      background: rgba(15, 23, 42, 0.08);
    }

    .sample-toolbar button.is-active {
      background: #2f7cc4;
      color: #ffffff;
    }

    .sample-motion-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
    }

    :root[data-surface="light"] .sample-motion-toggle {
      background: rgba(15, 23, 42, 0.06);
    }

    .sample-motion-toggle input {
      width: 14px;
      height: 14px;
      margin: 0;
      accent-color: #2f7cc4;
    }

    :root[data-surface="light"] body {
      background: #f6f8fb;
      color: #151922;
    }

    :root[data-surface="color"] body {
      background:
        linear-gradient(135deg, rgba(67, 92, 139, 0.32), transparent 40%),
        #202833;
      color: #f6f8fb;
    }

    :root[data-surface="lightstrip"] body {
      background: #181a1f;
      color: #f5f7fa;
    }

    .sample-surface-strip {
      display: none;
    }

    :root[data-surface="lightstrip"] .sample-surface-strip {
      display: block;
      position: fixed;
      inset: 0 auto 0 0;
      width: 128px;
      z-index: 2;
    }

    :root[data-surface="lightstrip"][data-position="right"] .sample-surface-strip {
      inset: 0 0 0 auto;
    }

    .sample-surface-strip span {
      position: absolute;
      left: 0;
      width: 128px;
      height: 150px;
      border-radius: 0 10px 10px 0;
      background: #f6f8fb;
    }

    :root[data-surface="lightstrip"][data-position="right"] .sample-surface-strip span {
      border-radius: 10px 0 0 10px;
    }

    .sample-surface-strip span:nth-child(1) {
      top: 14%;
    }

    .sample-surface-strip span:nth-child(2) {
      top: 44%;
    }

    .sample-surface-strip span:nth-child(3) {
      top: 74%;
    }

    main {
      position: relative;
      max-width: 760px;
      margin: 0 auto;
      padding: 72px 28px 48vh;
      z-index: 1;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 36px;
      letter-spacing: 0;
    }

    h2,
    h3 {
      scroll-margin-top: 24px;
    }

    h2 {
      margin-top: 56px;
      font-size: 24px;
    }

    h3 {
      margin-top: 32px;
      color: #d6dbe4;
      font-size: 18px;
    }

    p {
      color: #aab2c0;
    }

    :root[data-surface="light"] p {
      color: #4b5565;
    }

    .sample-note {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      padding: 14px 16px;
    }

    :root[data-surface="light"] .sample-note {
      border-color: rgba(15, 23, 42, 0.12);
      background: rgba(15, 23, 42, 0.04);
    }

    @media (max-width: 760px) {
      .sample-toolbar {
        right: 12px;
        left: 12px;
        flex-wrap: wrap;
        justify-content: flex-start;
      }

      :root[data-position="left"] .sample-toolbar {
        right: 12px;
        left: 12px;
      }

      main {
        padding-top: 148px;
      }
    }
  </style>
  <script>
    const sampleParams = new URLSearchParams(window.location.search);
    const samplePosition = sampleParams.get('position') === 'left' ? 'left' : 'right';
    const sampleSurface = ['light', 'dark', 'color', 'lightstrip'].includes(sampleParams.get('surface'))
      ? sampleParams.get('surface')
      : 'dark';
    const sampleReducedMotion = sampleParams.get('motion') === 'reduce';
    const legacyMode = sampleParams.get('mode');
    const requestedPreview = sampleParams.get('preview');
    const samplePreview = ['wheel', 'spotlight', 'gpt'].includes(requestedPreview)
      ? requestedPreview
      : legacyMode === 'glimmer' ? 'spotlight' : 'wheel';
    document.documentElement.dataset.surface = sampleSurface;
    document.documentElement.dataset.position = samplePosition;

    if (sampleReducedMotion && typeof window.matchMedia === 'function') {
      const nativeMatchMedia = window.matchMedia.bind(window);
      window.matchMedia = (query) => {
        const result = nativeMatchMedia(query);
        if (!String(query).includes('prefers-reduced-motion')) return result;
        return {
          matches: true,
          media: result.media,
          onchange: result.onchange,
          addListener: result.addListener ? result.addListener.bind(result) : () => {},
          removeListener: result.removeListener ? result.removeListener.bind(result) : () => {},
          addEventListener: result.addEventListener ? result.addEventListener.bind(result) : () => {},
          removeEventListener: result.removeEventListener ? result.removeEventListener.bind(result) : () => {},
          dispatchEvent: result.dispatchEvent ? result.dispatchEvent.bind(result) : () => false
        };
      };
    }

    window.chrome = {
      storage: {
        sync: {
          get(defaults, callback) {
            callback({
              ...defaults,
              themePreset: 'barcode',
              barcodePreview: samplePreview,
              expandMode: 'hover',
              minHeaders: 1,
              showAfterScrollScreens: 0,
              position: samplePosition,
              avoidExistingWidgets: false,
              forceShow: true
            });
          }
        },
        local: {
          get(defaults, callback) {
            callback(defaults);
          },
          set() {}
        }
      }
    };
  </script>
</head>
<body>
  <div class="sample-toolbar" role="toolbar" aria-label="Rail QA controls">
    <span class="sample-toolbar-title">Rail QA</span>
    <div class="sample-control-group" role="group" aria-label="Barcode title preview">
      <button class="is-active" type="button" data-param="preview" data-value="wheel" aria-pressed="true">Wheel</button>
      <button type="button" data-param="preview" data-value="spotlight" aria-pressed="false">Spotlight</button>
      <button type="button" data-param="preview" data-value="gpt" aria-pressed="false">GPT</button>
    </div>
    <div class="sample-control-group" role="group" aria-label="Rail position">
      <button class="is-active" type="button" data-param="position" data-value="right" aria-pressed="true">Right</button>
      <button type="button" data-param="position" data-value="left" aria-pressed="false">Left</button>
    </div>
    <div class="sample-control-group" role="group" aria-label="Surface">
      <button class="is-active" type="button" data-param="surface" data-value="dark" aria-pressed="true">Dark</button>
      <button type="button" data-param="surface" data-value="light" aria-pressed="false">Light</button>
      <button type="button" data-param="surface" data-value="color" aria-pressed="false">Color</button>
      <button type="button" data-param="surface" data-value="lightstrip" aria-pressed="false">Strip</button>
    </div>
    <label class="sample-motion-toggle">
      <input id="sampleReducedMotion" type="checkbox">
      Reduce
    </label>
  </div>
  <div class="sample-surface-strip" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
  </div>
  <main id="sample-content">
    <h1>Rail Navigation Performance Sample</h1>
    <p class="sample-note">
      This page loads the extension content script directly and switches between all three Barcode title preview styles.
      It generates many headings so hover labels, wave response, active section, and scroll-to-top behavior can be tested locally.
    </p>
  </main>
  <script>
    const main = document.getElementById('sample-content');
    for (let i = 1; i <= 72; i += 1) {
      const level = i % 3 === 0 ? 'h3' : 'h2';
      const heading = document.createElement(level);
      heading.textContent = `${String(i).padStart(2, '0')} ${level === 'h2' ? 'Section' : 'Detail'} hover preview checkpoint`;

      const paragraph = document.createElement('p');
      paragraph.textContent = 'Long-form sample copy gives the page enough scroll range for current-section tracking and rail hover behavior. The wording is intentionally repetitive so visual changes in the navigation are easier to spot.';

      main.appendChild(heading);
      main.appendChild(paragraph);
    }

    document.querySelectorAll('#github-toc, #github-sst, .toc-rail-preview, .toc-spotlight-layer, .toc-gpt-preview, .toc-glimmer-layer').forEach((node) => {
      node.remove();
    });

    const toolbar = document.querySelector('.sample-toolbar');
    const reducedMotionToggle = document.getElementById('sampleReducedMotion');
    const setSampleParam = (param, value) => {
      const nextUrl = new URL(window.location.href);
      nextUrl.searchParams.set(param, value);
      window.location.href = nextUrl.toString();
    };

    toolbar.querySelectorAll('button[data-param][data-value]').forEach((button) => {
      const isActive =
        (button.dataset.param === 'preview' && button.dataset.value === samplePreview) ||
        (button.dataset.param === 'position' && button.dataset.value === samplePosition) ||
        (button.dataset.param === 'surface' && button.dataset.value === sampleSurface);
      button.classList.toggle('is-active', isActive);
      button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      button.addEventListener('click', () => {
        setSampleParam(button.dataset.param, button.dataset.value);
      });
    });

    reducedMotionToggle.checked = sampleReducedMotion;
    reducedMotionToggle.addEventListener('change', () => {
      const nextUrl = new URL(window.location.href);
      if (reducedMotionToggle.checked) {
        nextUrl.searchParams.set('motion', 'reduce');
      } else {
        nextUrl.searchParams.delete('motion');
      }
      window.location.href = nextUrl.toString();
    });
  </script>
  <script src="../catalog.js?sample=barcode-preview-gpt-v1"></script>
  <script src="../theme.js?sample=barcode-preview-gpt-v1"></script>
</body>
</html>
