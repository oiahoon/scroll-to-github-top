<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart TOC SSPAI Hover Performance Sample</title>
  <link rel="stylesheet" href="../toc.css">
  <link rel="stylesheet" href="../themes.css">
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      background: #181a1f;
      color: #f5f7fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 72px 28px 48vh;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 36px;
      letter-spacing: 0;
    }

    h2,
    h3 {
      scroll-margin-top: 24px;
    }

    h2 {
      margin-top: 56px;
      font-size: 24px;
    }

    h3 {
      margin-top: 32px;
      color: #d6dbe4;
      font-size: 18px;
    }

    p {
      color: #aab2c0;
    }

    .sample-note {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      padding: 14px 16px;
    }
  </style>
  <script>
    const sampleParams = new URLSearchParams(window.location.search);
    const samplePosition = sampleParams.get('position') === 'left' ? 'left' : 'right';

    window.chrome = {
      storage: {
        sync: {
          get(defaults, callback) {
            callback({
              ...defaults,
              themePreset: 'sspai',
              expandMode: 'hover',
              minHeaders: 1,
              showAfterScrollScreens: 0,
              position: samplePosition,
              avoidExistingWidgets: false,
              forceShow: true
            });
          }
        },
        local: {
          get(defaults, callback) {
            callback(defaults);
          },
          set() {}
        }
      }
    };
  </script>
</head>
<body>
  <main id="sample-content">
    <h1>SSPAI Hover Preview Performance Sample</h1>
    <p class="sample-note">
      This page loads the extension content script directly and forces the SSPAI rail preset.
      It generates many headings so the rail hover wave, item preview, active section, and scroll-to-top control can be tested locally.
    </p>
  </main>
  <script>
    const main = document.getElementById('sample-content');
    for (let i = 1; i <= 72; i += 1) {
      const level = i % 3 === 0 ? 'h3' : 'h2';
      const heading = document.createElement(level);
      heading.textContent = `${String(i).padStart(2, '0')} ${level === 'h2' ? 'Section' : 'Detail'} hover preview checkpoint`;

      const paragraph = document.createElement('p');
      paragraph.textContent = 'Long-form sample copy gives the page enough scroll range for current-section tracking and rail hover behavior. The wording is intentionally repetitive so visual changes in the navigation are easier to spot.';

      main.appendChild(heading);
      main.appendChild(paragraph);
    }
  </script>
  <script src="../catalog.js"></script>
  <script src="../theme.js"></script>
</body>
</html>
